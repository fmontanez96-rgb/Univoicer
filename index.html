<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Colección de Saludos de Doblaje</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f7ff;
      --bg-soft: #ffffff;
      --panel: #ffffff;
      --panel-2: #f3f7ff;
      --text: #1f2a44;
      --muted: #556487;
      --line: #c8d3ea;
      --accent: #6a66f6;
      --accent-hover: #5448e8;
      --focus: #11b8cb;
      --ok: #179d6c;
      --ok-soft: #dff9ef;
      --rare-comun: #52617d;
      --rare-raro: #0f8d9e;
      --rare-epico: #7046df;
      --rare-legendario: #8a4b00;
      --shadow: 0 10px 24px rgba(53, 64, 114, .12);
      --shadow-soft: 0 6px 14px rgba(53, 64, 114, .1);
      --radius: 18px;
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; min-height: 100%; height: 100%; overflow: hidden; }

    body {
      font-family: "Nunito", Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      background:
        radial-gradient(circle at 12% 10%, rgba(163, 128, 255, .23), transparent 34%),
        radial-gradient(circle at 92% 18%, rgba(71, 212, 196, .2), transparent 34%),
        radial-gradient(circle at 54% 108%, rgba(255, 147, 133, .22), transparent 40%),
        var(--bg);
      color: var(--text);
      line-height: 1.5;
    }

    .app { width: 100%; height: 100vh; padding: 12px; }

    .layout {
      display: grid;
      grid-template-columns: 300px minmax(0, 1fr);
      gap: 18px;
      align-items: start;
      height: 100%;
    }

    .sidebar {
      position: sticky;
      top: 0;
      height: calc(100vh - 24px);
      overflow: auto;
      background: linear-gradient(140deg, rgba(31,42,79,.9), rgba(20,27,51,.95));
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 18px;
      box-shadow: var(--shadow);
      display: grid;
      gap: 14px;
    }

    .title {
      margin: 0;
      font-size: clamp(1.3rem, 1rem + 1.4vw, 2rem);
      letter-spacing: .2px;
      font-weight: 800;
      color: #26245f;
    }

    .subtitle { margin: 4px 0 0; color: var(--muted); }

    .sidebar-nav {
      display: grid;
      gap: 8px;
    }

    .sidebar-item {
      width: 100%;
      text-align: left;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .sidebar-item[disabled] {
      cursor: not-allowed;
      opacity: .55;
      transform: none;
    }

    .content {
      min-width: 0;
      display: grid;
      gap: 16px;
      height: calc(100vh - 24px);
      overflow: auto;
    }
    .sidebar-toggle { margin-top: 4px; }
    .sidebar-label { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .sidebar-emoji { width: 22px; text-align: center; flex: none; }
    .layout.sidebar-collapsed { grid-template-columns: 86px minmax(0, 1fr); }
    .layout.sidebar-collapsed .sidebar { padding: 14px 10px; }
    .layout.sidebar-collapsed .sidebar-copy,
    .layout.sidebar-collapsed .sidebar-label { display: none; }
    .layout.sidebar-collapsed .sidebar-item { justify-content: center; padding-inline: 6px; }

    button, select {
      border: 1px solid var(--line);
      background: var(--panel);
      color: var(--text);
      border-radius: 12px;
      padding: 10px 14px;
      font: inherit;
      cursor: pointer;
      transition: transform .25s ease, border-color .25s ease, box-shadow .25s ease, background-color .25s ease;
    }

    button:hover, select:hover {
      transform: translateY(-1px);
      border-color: var(--accent);
      box-shadow: var(--shadow-soft);
      background: #f8f8ff;
    }
    button:active, select:active { transform: translateY(0); box-shadow: 0 2px 8px rgba(53, 64, 114, .18) inset; }
    button:focus-visible, select:focus-visible { outline: 3px solid color-mix(in srgb, var(--focus) 38%, white); outline-offset: 2px; }
    button.active { border-color: var(--accent); box-shadow: 0 0 0 3px color-mix(in srgb, var(--accent) 28%, white); background: #f5f3ff; }

    .view { display: none; }
    .view.active { display: block; animation: fade .25s ease; }

    @keyframes fade { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 16px;
    }

    .universe-map-shell {
      position: relative;
      width: 100%;
      height: calc(100vh - 24px);
      border: 1px solid rgba(120, 178, 255, .38);
      border-radius: var(--radius);
      box-shadow:
        0 18px 34px rgba(4, 8, 22, .45),
        inset 0 0 0 1px rgba(176, 220, 255, .14);
      overflow: auto;
      background:
        radial-gradient(circle at 12% 12%, rgba(81, 194, 255, .12), transparent 34%),
        radial-gradient(circle at 88% 16%, rgba(176, 110, 255, .12), transparent 32%),
        rgba(6, 11, 24, 0.95);
      scroll-behavior: smooth;
    }

    #universeMapCanvas {
      position: relative;
      min-width: 100%;
      min-height: 100%;
      background:
        linear-gradient(170deg, rgba(7, 12, 28, .98), rgba(15, 24, 48, .96));
      isolation: isolate;
    }

    .map-nebula-layer,
    .map-stars-layer {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    .map-nebula-layer {
      z-index: 0;
      background:
        radial-gradient(circle at 14% 24%, rgba(50, 173, 255, .22), transparent 35%),
        radial-gradient(circle at 84% 16%, rgba(163, 112, 255, .2), transparent 34%),
        radial-gradient(circle at 64% 74%, rgba(75, 217, 255, .14), transparent 38%),
        radial-gradient(circle at 20% 84%, rgba(139, 117, 255, .15), transparent 38%);
      filter: blur(1px) saturate(1.08);
    }

    .map-stars-layer {
      z-index: 1;
      opacity: .36;
      background-image:
        radial-gradient(1.5px 1.5px at 8% 18%, rgba(242, 251, 255, .86), transparent 70%),
        radial-gradient(1.6px 1.6px at 26% 72%, rgba(228, 238, 255, .78), transparent 72%),
        radial-gradient(1.2px 1.2px at 38% 32%, rgba(225, 248, 255, .8), transparent 74%),
        radial-gradient(1.4px 1.4px at 57% 82%, rgba(214, 233, 255, .74), transparent 72%),
        radial-gradient(1.8px 1.8px at 72% 24%, rgba(235, 250, 255, .85), transparent 72%),
        radial-gradient(1.4px 1.4px at 88% 66%, rgba(235, 241, 255, .74), transparent 72%),
        radial-gradient(1.2px 1.2px at 94% 38%, rgba(212, 231, 255, .74), transparent 72%);
      animation: starsDrift 24s linear infinite;
    }

    @keyframes starsDrift {
      from { transform: translateY(0); }
      50% { transform: translateY(-6px); }
      to { transform: translateY(0); }
    }

    .map-world {
      position: relative;
      min-width: 100%;
      min-height: 100%;
      z-index: 2;
    }

    .universe-node {
      --w: 220px;
      --h: 186px;
      position: absolute;
      width: var(--w);
      height: var(--h);
      border: 0;
      box-shadow: none;
      overflow: visible;
      background: transparent;
      transition: transform .25s ease, filter .25s ease;
      z-index: 2;
      cursor: pointer;
      padding: 0;
      animation: nodeFloat 5.8s ease-in-out infinite;
      animation-delay: var(--float-delay, 0s);
    }

    .universe-node::before {
      content: '';
      position: absolute;
      inset: 6px 18px 34px;
      border-radius: inherit;
      background:
        radial-gradient(circle at 35% 30%, rgba(76, 220, 255, .26), transparent 62%),
        radial-gradient(circle at 72% 26%, rgba(164, 109, 255, .22), transparent 58%);
      filter: blur(12px);
      opacity: .7;
      pointer-events: none;
      z-index: 1;
    }

    @keyframes nodeFloat {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-4px); }
    }

    .universe-node::after {
      content: '';
      position: absolute;
      left: 12%;
      right: 12%;
      bottom: 10px;
      height: 24px;
      border-radius: 999px;
      background: rgba(0, 0, 0, .45);
      filter: blur(8px);
      pointer-events: none;
      transition: transform .25s ease, opacity .25s ease;
      opacity: .7;
    }

    .universe-node:hover {
      transform: translateY(-8px) scale(1.04);
      filter: brightness(1.08);
    }

    .universe-node:hover::after {
      transform: scale(1.1);
      opacity: .86;
    }

    .island-base {
      position: absolute;
      left: 8px;
      right: 8px;
      bottom: 20px;
      height: 92px;
      border-radius: inherit;
      border: 1px solid rgba(154, 207, 255, .3);
      background:
        radial-gradient(circle at 30% 20%, rgba(190, 234, 255, .35), transparent 55%),
        linear-gradient(165deg, rgba(26, 44, 77, .98), rgba(10, 19, 37, .98));
      box-shadow:
        inset 0 1px 0 rgba(232, 248, 255, .35),
        0 16px 24px rgba(4, 8, 18, .56);
      overflow: hidden;
    }

    .island-base::after {
      content: '';
      position: absolute;
      inset: 12px;
      border-radius: inherit;
      border: 1px dashed rgba(255,255,255,.14);
      pointer-events: none;
    }

    .universe-node .universe-cover {
      position: absolute;
      top: 10px;
      left: 50%;
      transform: translateX(-50%);
      width: 116px;
      height: 116px;
      object-fit: cover;
      filter: saturate(1.1) contrast(1.04);
      border-radius: 14px;
      border: 1px solid rgba(210, 230, 255, .55);
      box-shadow: 0 10px 22px rgba(2, 8, 24, .55);
      z-index: 3;
      background: rgba(17, 22, 42, .95);
    }

    .universe-node .cover-fallback {
      position: absolute;
      top: 10px;
      left: 50%;
      transform: translateX(-50%);
      width: 116px;
      height: 116px;
      display: none;
      border-radius: 14px;
      border: 1px solid rgba(154, 205, 255, .55);
      background: linear-gradient(145deg, rgba(89,208,255,.3), rgba(167,139,250,.3));
      color: #eef5ff;
      padding: 10px;
      font-size: .76rem;
      align-items: flex-end;
      justify-content: center;
      z-index: 4;
    }

    .universe-node .universe-cover.is-broken + .cover-fallback {
      display: flex;
    }

    .universe-node .node-info {
      position: absolute;
      left: 16px;
      right: 16px;
      bottom: 32px;
      z-index: 3;
      text-align: center;
      padding: 8px 10px;
      border-radius: 12px;
      border: 1px solid rgba(115, 201, 255, .62);
      background: linear-gradient(145deg, rgba(11, 24, 48, .76), rgba(17, 21, 42, .74));
      box-shadow:
        inset 0 0 0 1px rgba(178, 145, 255, .22),
        0 0 18px rgba(74, 195, 255, .24);
    }

    .universe-node h3 {
      margin: 0;
      font-size: .88rem;
      color: #eff7ff;
      text-shadow: 0 2px 10px rgba(0, 0, 0, .82);
      letter-spacing: .03em;
      text-transform: uppercase;
      font-weight: 800;
      font-family: "Nunito", Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
    }

    .map-popup {
      position: absolute;
      width: min(300px, 88vw);
      border-radius: 16px;
      border: 1px solid rgba(140, 186, 255, .45);
      background: rgba(16, 26, 50, .98);
      box-shadow: var(--shadow);
      padding: 14px;
      z-index: 8;
      animation: popupIn .18s ease;
    }

    .map-popup form { display: grid; gap: 10px; }
    .map-popup label { display: grid; gap: 4px; color: #d8e8ff; font-size: .85rem; }
    .map-popup input {
      border: 1px solid rgba(147, 175, 255, .45);
      background: rgba(240, 245, 255, .98);
      color: #1f2a44;
      border-radius: 10px;
      padding: 9px 10px;
      font: inherit;
    }
    .cover-mode {
      display: inline-grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
      padding: 4px;
      border-radius: 12px;
      border: 1px solid rgba(147, 175, 255, .35);
      background: rgba(255,255,255,.06);
    }
    .cover-mode button {
      padding: 8px 10px;
      border-radius: 9px;
      border-color: transparent;
      background: rgba(255,255,255,.08);
      color: #e5eeff;
      font-weight: 700;
    }
    .cover-mode button.active {
      color: #111f40;
      background: #d7e8ff;
      box-shadow: none;
      border-color: transparent;
    }
    .cover-input-group[hidden] { display: none; }
    .map-popup .popup-feedback { min-height: 16px; font-size: .8rem; color: #ffd2d2; margin: 0; }
    .map-popup button[type="submit"] {
      background: var(--accent);
      color: #fff;
      border-color: color-mix(in srgb, var(--accent) 68%, white);
    }
    .map-popup button[type="submit"]:hover { background: var(--accent-hover); }

    @keyframes popupIn {
      from { opacity: 0; transform: translateY(6px) scale(.96); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    .universe-node p {
      margin: 4px 0 0;
      font-size: .74rem;
      color: #d4e9ff;
      text-shadow: 0 2px 10px rgba(0, 0, 0, .8);
      letter-spacing: .06em;
      font-weight: 700;
      text-transform: uppercase;
    }

    .card {
      background: linear-gradient(158deg, var(--panel), var(--panel-2));
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 16px;
      box-shadow: var(--shadow);
      transition: transform .25s ease, border-color .25s ease, box-shadow .25s ease;
    }

    .card:hover { transform: translateY(-3px); border-color: color-mix(in srgb, var(--accent) 58%, white); box-shadow: 0 14px 28px rgba(71, 54, 130, .16); }

    .universe-name { margin: 0 0 8px; font-size: 1.05rem; }
    .muted { color: var(--muted); font-size: .95rem; }

    .universe-layout {
      display: grid;
      grid-template-columns: minmax(0, 2fr) minmax(260px, 1fr);
      gap: 16px;
    }

    .panel, .sidebar {
      background: linear-gradient(160deg, rgba(255,255,255,.95), rgba(244,249,255,.98));
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 16px;
      box-shadow: var(--shadow-soft);
    }

    .toolbar {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr)) auto;
      gap: 10px;
      align-items: end;
      margin-bottom: 14px;
    }

    .toolbar label { display: grid; gap: 6px; font-size: .9rem; color: var(--muted); }

    .video-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 14px;
    }

    .universe-header {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 16px;
      align-items: stretch;
      margin-bottom: 14px;
    }

    .universe-hero {
      display: grid;
      grid-template-columns: 220px minmax(0, 1fr);
      gap: 14px;
      align-items: center;
    }

    .universe-hero img {
      width: 100%;
      height: 140px;
      object-fit: cover;
      border-radius: 14px;
      border: 1px solid var(--line);
      box-shadow: var(--shadow-soft);
      background: rgba(19, 28, 51, .8);
    }

    .universe-controls {
      display: grid;
      gap: 8px;
      align-content: start;
      justify-items: end;
    }

    .primary-btn {
      background: var(--accent);
      color: #fff;
      border-color: color-mix(in srgb, var(--accent) 68%, white);
      font-weight: 700;
    }
    .primary-btn:hover { background: var(--accent-hover); }

    .add-video-form {
      display: grid;
      gap: 10px;
      padding: 14px;
      border-radius: 14px;
      border: 1px dashed color-mix(in srgb, var(--accent) 44%, white);
      background: rgba(245, 244, 255, .9);
      margin-bottom: 14px;
    }
    .add-video-form label { display: grid; gap: 6px; color: var(--muted); font-size: .92rem; }
    .add-video-form input, .add-video-form select {
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 10px 12px;
      font: inherit;
      width: 100%;
      background: #fff;
    }

    .video-card { cursor: pointer; }
    .video-card .video-thumb {
      width: 100%;
      height: 150px;
      object-fit: cover;
      border-radius: 12px;
      border: 1px solid var(--line);
      margin-bottom: 10px;
      background: rgba(17, 22, 42, .86);
    }
    .video-card h3 { margin: 0 0 6px; font-size: 1rem; }
    .video-card p { margin: 0; color: var(--muted); font-size: .92rem; }

    .video-title {
      margin: 0 0 8px;
      font-size: .92rem;
      color: #334064;
      min-height: 36px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border-radius: 999px;
      padding: 4px 10px;
      font-size: .79rem;
      margin-top: 10px;
      border: 1px solid transparent;
      font-weight: 700;
      letter-spacing: .2px;
    }

    .rare-comun { background: rgba(82,97,125,.12); color: var(--rare-comun); border-color: rgba(82,97,125,.35); }
    .rare-raro { background: rgba(15,141,158,.13); color: var(--rare-raro); border-color: rgba(15,141,158,.36); }
    .rare-epico { background: rgba(112,70,223,.13); color: var(--rare-epico); border-color: rgba(112,70,223,.35); }
    .rare-legendario { background: rgba(185,108,0,.14); color: var(--rare-legendario); border-color: rgba(185,108,0,.36); }

    .actions { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 12px; }

    .player-box {
      margin-top: 14px;
      border: 1px solid var(--line);
      border-radius: 16px;
      overflow: hidden;
      background: #eef2fd;
    }

    iframe { width: 100%; aspect-ratio: 16/9; border: 0; display: block; }

    .index-list { display: grid; gap: 8px; max-height: 460px; overflow: auto; }
    .index-row {
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(255,255,255,.85);
      transition: border-color .25s ease, transform .25s ease, box-shadow .25s ease;
    }
    .index-row:hover { border-color: color-mix(in srgb, var(--accent) 40%, white); transform: translateY(-1px); box-shadow: var(--shadow-soft); }

    .marathon {
      margin-top: 10px;
      padding: 10px 12px;
      border-radius: 12px;
      background: color-mix(in srgb, var(--focus) 14%, white);
      color: #0e5460;
      border: 1px solid color-mix(in srgb, var(--focus) 42%, white);
      font-size: .9rem;
    }

    details { margin-top: 10px; }
    details summary { cursor: pointer; color: #364164; }
    .version-list { display: grid; gap: 8px; margin-top: 8px; }

    .achievements { display: grid; gap: 10px; }
    .achievement {
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 12px;
      background: rgba(255,255,255,.9);
      box-shadow: var(--shadow-soft);
    }
    .achievement.done { border-color: color-mix(in srgb, var(--ok) 48%, white); background: var(--ok-soft); }

    .detail-modal {
      position: fixed;
      inset: 0;
      background: rgba(5, 8, 21, .7);
      z-index: 30;
      display: grid;
      place-items: center;
      padding: 18px;
    }
    .detail-content {
      width: min(980px, 100%);
      max-height: calc(100vh - 36px);
      overflow: auto;
      border-radius: 18px;
      border: 1px solid var(--line);
      background: linear-gradient(165deg, #fff, #f5f8ff);
      box-shadow: var(--shadow);
      padding: 16px;
      display: grid;
      gap: 12px;
    }
    .detail-grid {
      display: grid;
      grid-template-columns: minmax(0, 1.6fr) minmax(240px, 1fr);
      gap: 14px;
    }
    .detail-list {
      margin: 0;
      padding-left: 18px;
      display: grid;
      gap: 4px;
      color: #324365;
    }
    .detail-close {
      justify-self: end;
    }

    @media (max-width: 960px) {
      .layout { grid-template-columns: 1fr; }
      .sidebar {
        position: static;
        height: auto;
      }
      .sidebar-nav {
        grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      }
      .universe-layout { grid-template-columns: 1fr; }
      .universe-header { grid-template-columns: 1fr; }
      .universe-hero { grid-template-columns: 1fr; }
      .detail-grid { grid-template-columns: 1fr; }
      .toolbar { grid-template-columns: 1fr; }
      .content { height: auto; }
      html, body { overflow: auto; }
    }
  </style>
</head>
<body>
  <main class="app">
    <div class="layout" id="appLayout">
      <aside class="sidebar" aria-label="Menú principal">
        <div class="sidebar-copy">
          <h1 class="title">🎙️ Colección de Saludos de Doblaje</h1>
          <p class="subtitle">Explora universos, personajes, rarezas y desbloquea logros.</p>
        </div>
        <button id="toggleSidebar" class="sidebar-toggle">↔️ Colapsar menú</button>
        <nav class="sidebar-nav">
          <button id="navInicio" class="sidebar-item"><span class="sidebar-emoji">🏠</span><span class="sidebar-label">1. Inicio</span></button>
          <button id="navUniverses" class="sidebar-item active"><span class="sidebar-emoji">🪐</span><span class="sidebar-label">2. Universos</span></button>
          <button id="navIndice" class="sidebar-item"><span class="sidebar-emoji">📚</span><span class="sidebar-label">3. Índice</span></button>
          <button id="navMaraton" class="sidebar-item"><span class="sidebar-emoji">🎬</span><span class="sidebar-label">4. Maratón</span></button>
          <button id="navRarezas" class="sidebar-item"><span class="sidebar-emoji">💎</span><span class="sidebar-label">5. Rarezas</span></button>
          <button id="navActores" class="sidebar-item"><span class="sidebar-emoji">🎙️</span><span class="sidebar-label">6. Actores</span></button>
          <button id="navVersiones" class="sidebar-item"><span class="sidebar-emoji">🧬</span><span class="sidebar-label">7. Versiones</span></button>
          <button id="navAchievements" class="sidebar-item"><span class="sidebar-emoji">🏆</span><span class="sidebar-label">8. Logros</span></button>
          <button id="navFavoritos" class="sidebar-item"><span class="sidebar-emoji">⭐</span><span class="sidebar-label">9. Favoritos</span></button>
          <button id="navBuscar" class="sidebar-item"><span class="sidebar-emoji">🔎</span><span class="sidebar-label">10. Buscar</span></button>
          <button id="navStats" class="sidebar-item"><span class="sidebar-emoji">📈</span><span class="sidebar-label">11. Estadísticas</span></button>
          <button id="navConfig" class="sidebar-item"><span class="sidebar-emoji">⚙️</span><span class="sidebar-label">12. Configuración</span></button>
        </nav>
      </aside>

      <section class="content">
        <section id="viewMap" class="view active"></section>
        <section id="viewUniverse" class="view"></section>
        <section id="viewAchievements" class="view"></section>
      </section>
    </div>
  </main>

  <script>
    const VIDEOS = [];

    const state = {
      view: 'map',
      universe: null,
      filters: { personaje: 'todos', actor: 'todos', rareza: 'todos' },
      selectedVideoId: null,
      showAddForm: false,
      marathon: { active: false, queue: [], position: 0 },
      universeNodes: [],
      mapCanvas: { width: 1400, height: 900 }
    };
    const UNIVERSES_STORAGE_KEY = 'universes_map_v1';
    const MAX_LOCAL_IMAGE_BYTES = 2 * 1024 * 1024;
    const NODE_HALF_WIDTH = 110;
    const NODE_HALF_HEIGHT = 93;

    const appLayout = document.getElementById('appLayout');
    const toggleSidebar = document.getElementById('toggleSidebar');
    const navUniverses = document.getElementById('navUniverses');
    const navAchievements = document.getElementById('navAchievements');
    const viewMap = document.getElementById('viewMap');
    const viewUniverse = document.getElementById('viewUniverse');
    const viewAchievements = document.getElementById('viewAchievements');

    function rarityClass(rareza) {
      return `rare-${rareza.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '')}`;
    }

    function toEmbedUrl(url, autoplay = 0) {
      const match = url.match(/(?:v=|\.be\/)([A-Za-z0-9_-]{11})/);
      const id = match ? match[1] : '';
      return `https://www.youtube.com/embed/${id}?rel=0&modestbranding=1&autoplay=${autoplay}&enablejsapi=1`;
    }

    function groupByUniverse() {
      return VIDEOS.reduce((acc, item) => {
        const universes = Array.isArray(item.universo) ? item.universo : [item.universo];
        universes.filter(Boolean).forEach((name) => {
          acc[name] = acc[name] || [];
          acc[name].push(item);
        });
        return acc;
      }, {});
    }

    function normalizeUniverseName(name) {
      return name.trim().toLowerCase();
    }

    function createPlaceholderCover(name) {
      const label = encodeURIComponent((name || 'UNIVERSO').slice(0, 18).toUpperCase());
      return `data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 400 280'><defs><linearGradient id='g' x1='0' y1='0' x2='1' y2='1'><stop offset='0%' stop-color='%2359d0ff'/><stop offset='100%' stop-color='%23a78bfa'/></linearGradient></defs><rect width='400' height='280' fill='%23111a34'/><rect x='14' y='14' width='372' height='252' rx='18' fill='url(%23g)' opacity='.4'/><text x='200' y='150' font-size='30' font-family='Arial, sans-serif' text-anchor='middle' fill='white'>${label}</text></svg>`;
    }

    function getSafeUniverseCover(name, cover) {
      return cover || createPlaceholderCover(name);
    }

    function validateCoverUrl(urlText) {
      if (!urlText?.trim()) return '';
      try {
        const parsed = new URL(urlText.trim());
        if (!['http:', 'https:'].includes(parsed.protocol)) {
          throw new Error('Protocolo no permitido');
        }
        return parsed.toString();
      } catch (_) {
        throw new Error('La URL de portada no es válida');
      }
    }

    function fileToDataUrl(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(String(reader.result || ''));
        reader.onerror = () => reject(new Error('No fue posible leer la imagen local.'));
        reader.readAsDataURL(file);
      });
    }

    function saveUniverseNodes() {
      localStorage.setItem(UNIVERSES_STORAGE_KEY, JSON.stringify(state.universeNodes));
    }

    function loadUniverseNodesFromStorage() {
      try {
        const raw = localStorage.getItem(UNIVERSES_STORAGE_KEY);
        if (!raw) return [];
        const parsed = JSON.parse(raw);
        if (!Array.isArray(parsed)) return [];
        return parsed
          .filter(node => node && typeof node.name === 'string')
          .map((node, idx) => ({
            id: node.id || cssSafe(node.name) || `universo-${idx}`,
            name: node.name.trim(),
            cover: typeof node.cover === 'string' ? node.cover : '',
            x: Number(node.x) || 220 + (idx * 80),
            y: Number(node.y) || 220 + (idx * 60),
            neighbors: Array.isArray(node.neighbors) ? node.neighbors.filter(Boolean) : [],
            shape: node.shape || createNodeShape(hashCode(node.name))
          }));
      } catch (_) {
        return [];
      }
    }

    function getVideoUniverses(video) {
      if (Array.isArray(video.universo)) return video.universo;
      return video.universo ? [video.universo] : [];
    }

    function getUniverseVideos() {
      return VIDEOS.filter(v => getVideoUniverses(v).includes(state.universe));
    }

    function getFilteredUniverseVideos() {
      return getUniverseVideos().filter(v => {
        const m1 = state.filters.personaje === 'todos' || (v.personaje || 'Sin personaje') === state.filters.personaje;
        const m2 = state.filters.actor === 'todos' || (v.actor_de_doblaje || 'Sin actor') === state.filters.actor;
        const m3 = state.filters.rareza === 'todos' || (v.rareza || 'Común') === state.filters.rareza;
        return m1 && m2 && m3;
      });
    }

    function getCharactersIndex(videos) {
      const grouped = videos.reduce((acc, v) => {
        acc[v.personaje] = acc[v.personaje] || [];
        acc[v.personaje].push(v);
        return acc;
      }, {});
      return Object.entries(grouped).map(([personaje, versions]) => ({ personaje, versions }));
    }

    function hashCode(text) {
      return [...text].reduce((acc, ch) => ((acc * 31) + ch.charCodeAt(0)) >>> 0, 7);
    }

    function getUniverseCover(videos) {
      const first = videos?.[0];
      if (!first) return '';
      const embed = toEmbedUrl(first.url_youtube || first.url_video || '');
      const videoId = embed.split('/embed/')[1]?.split('?')[0];
      return videoId ? `https://i.ytimg.com/vi/${videoId}/hqdefault.jpg` : '';
    }

    function getYoutubeId(url) {
      const match = String(url || '').match(/(?:v=|\/embed\/|\.be\/)([A-Za-z0-9_-]{11})/);
      return match?.[1] || '';
    }

    function normalizeYoutubeUrl(url) {
      const id = getYoutubeId(url);
      return id ? `https://www.youtube.com/watch?v=${id}` : '';
    }

    async function fetchYoutubeMetadata(url) {
      const normalized = normalizeYoutubeUrl(url);
      const id = getYoutubeId(normalized);
      if (!id) return { title: 'Video sin título', thumbnail: '' };
      const fallbackThumb = `https://i.ytimg.com/vi/${id}/hqdefault.jpg`;
      try {
        const endpoint = `https://www.youtube.com/oembed?url=${encodeURIComponent(normalized)}&format=json`;
        const response = await fetch(endpoint);
        if (!response.ok) throw new Error('No disponible');
        const data = await response.json();
        return {
          title: data.title || 'Video sin título',
          thumbnail: data.thumbnail_url || fallbackThumb
        };
      } catch (_) {
        return { title: 'Video sin título', thumbnail: fallbackThumb };
      }
    }

    function createNodeShape(seed) {
      const pick = (min, max, shift) => min + ((seed >> shift) % (max - min + 1));
      return `${pick(42, 58, 2)}% ${pick(35, 62, 5)}% ${pick(44, 60, 8)}% ${pick(36, 62, 11)}% / ${pick(42, 64, 14)}% ${pick(36, 60, 17)}% ${pick(38, 62, 20)}% ${pick(36, 62, 23)}%`;
    }

    function findPlacementForNode(existingNodes, canvas, seed) {
      const minDistance = 235;
      const margin = 140;
      const candidateAngles = 12;
      const radii = [220, 310, 400, 490];
      const sortedAnchors = [...existingNodes].sort((a, b) => a.neighbors.length - b.neighbors.length);

      const isValidPoint = (x, y) => {
        if (x < margin || y < margin || x > canvas.width - margin || y > canvas.height - margin) return false;
        return existingNodes.every(node => Math.hypot(node.x - x, node.y - y) >= minDistance);
      };

      for (const anchor of sortedAnchors) {
        for (const radius of radii) {
          for (let i = 0; i < candidateAngles; i += 1) {
            const baseAngle = (Math.PI * 2 * i) / candidateAngles;
            const jitter = (((seed + i * 13 + radius) % 27) - 13) * (Math.PI / 180);
            const angle = baseAngle + jitter;
            const x = Math.round(anchor.x + Math.cos(angle) * radius);
            const y = Math.round(anchor.y + Math.sin(angle) * radius);
            if (isValidPoint(x, y)) {
              return { x, y, anchorId: anchor.id };
            }
          }
        }
      }
      return null;
    }

    function resolveNodeCollision(x, y, existingNodes) {
      const minDistance = 225;
      const collides = (px, py) => existingNodes.some(node => Math.hypot(node.x - px, node.y - py) < minDistance);
      if (!collides(x, y)) return { x, y };
      for (let i = 1; i <= 32; i += 1) {
        const angle = i * 0.9;
        const radius = 24 + (i * 16);
        const candidateX = Math.round(x + Math.cos(angle) * radius);
        const candidateY = Math.round(y + Math.sin(angle) * radius);
        if (!collides(candidateX, candidateY)) return { x: candidateX, y: candidateY };
      }
      return { x: x + 48, y: y + 48 };
    }

    function recalculateMapCanvasSize(viewportWidth = 0, viewportHeight = 0) {
      const padding = 180;
      const minWidth = Math.max(1200, viewportWidth + 180);
      const minHeight = Math.max(760, viewportHeight + 180);
      if (!state.universeNodes.length) {
        state.mapCanvas.width = minWidth;
        state.mapCanvas.height = minHeight;
        return;
      }
      const xs = state.universeNodes.map(node => node.x);
      const ys = state.universeNodes.map(node => node.y);
      const maxX = Math.max(...xs) + NODE_HALF_WIDTH + padding;
      const maxY = Math.max(...ys) + NODE_HALF_HEIGHT + padding;
      state.mapCanvas.width = Math.max(minWidth, maxX);
      state.mapCanvas.height = Math.max(minHeight, maxY);
    }

    function ensureUniverseNodes() {
      const universeMap = groupByUniverse();
      const names = Array.from(new Set([...Object.keys(universeMap), ...state.universeNodes.map(node => node.name)]));
      if (!names.length) return;

      const existingByName = new Map(state.universeNodes.map(node => [normalizeUniverseName(node.name), node]));

      if (!state.universeNodes.length && names.length) {
        const firstName = names[0];
        const firstSeed = hashCode(firstName);
        state.universeNodes.push({
          id: cssSafe(firstName),
          name: firstName,
          cover: getSafeUniverseCover(firstName, getUniverseCover(universeMap[firstName])),
          x: Math.round(state.mapCanvas.width / 2),
          y: Math.round(state.mapCanvas.height / 2),
          neighbors: [],
          shape: createNodeShape(firstSeed)
        });
      }

      names.forEach((name) => {
        const normalized = normalizeUniverseName(name);
        if (existingByName.has(normalized) || state.universeNodes.some(node => normalizeUniverseName(node.name) === normalized)) return;
        const seed = hashCode(name);
        let placement = findPlacementForNode(state.universeNodes, state.mapCanvas, seed);
        let safety = 0;
        while (!placement && safety < 5) {
          state.mapCanvas.width += 360;
          state.mapCanvas.height += 240;
          placement = findPlacementForNode(state.universeNodes, state.mapCanvas, seed + safety);
          safety += 1;
        }
        const fallbackX = state.mapCanvas.width - 180 - (seed % 120);
        const fallbackY = state.mapCanvas.height - 180 - ((seed >> 3) % 120);
        const point = placement || {
          x: Math.max(160, fallbackX),
          y: Math.max(160, fallbackY),
          anchorId: state.universeNodes[0]?.id
        };

        state.universeNodes.push({
          id: cssSafe(name),
          name,
          cover: getSafeUniverseCover(name, getUniverseCover(universeMap[name])),
          x: point.x,
          y: point.y,
          neighbors: point.anchorId ? [point.anchorId] : [],
          shape: createNodeShape(seed)
        });

        if (point.anchorId) {
          const anchor = state.universeNodes.find(node => node.id === point.anchorId);
          if (anchor && !anchor.neighbors.includes(cssSafe(name))) {
            anchor.neighbors.push(cssSafe(name));
          }
        }
      });
      state.universeNodes.forEach(node => {
        if (!node.cover && universeMap[node.name]) {
          node.cover = getSafeUniverseCover(node.name, getUniverseCover(universeMap[node.name]));
        } else if (!node.cover) {
          node.cover = createPlaceholderCover(node.name);
        }
      });
      saveUniverseNodes();
    }

    function renderMapView() {
      const universes = groupByUniverse();
      ensureUniverseNodes();
      const nodesMarkup = state.universeNodes.map(node => {
        const videos = universes[node.name] || [];
        const floatDelay = ((Math.abs(hashCode(node.id)) % 24) / 10).toFixed(1);
        return `
          <button class="universe-node" data-node-id="${node.id}" data-open="${node.name}" style="left:${node.x - NODE_HALF_WIDTH}px; top:${node.y - NODE_HALF_HEIGHT}px; border-radius:${node.shape}; --float-delay:-${floatDelay}s;">
            <span class="island-base" style="border-radius:${node.shape};"></span>
            <img class="universe-cover" src="${getSafeUniverseCover(node.name, node.cover)}" alt="Portada de ${node.name}" loading="lazy">
            <span class="cover-fallback">Portada no disponible</span>
            <span class="node-info">
              <h3>${node.name}</h3>
              <p>${videos.length} videos</p>
            </span>
          </button>
        `;
      }).join('');

      viewMap.innerHTML = `
        <div class="universe-map-shell">
          <div id="universeMapCanvas" aria-label="Mapa de universos explorable">
            <div class="map-nebula-layer" aria-hidden="true"></div>
            <div class="map-stars-layer" aria-hidden="true"></div>
            <div class="map-world" id="mapWorld">
              ${nodesMarkup}
            </div>
          </div>
        </div>
      `;

      const mapCanvas = document.getElementById('universeMapCanvas');
      const mapWorld = document.getElementById('mapWorld');
      if (!mapCanvas || !mapWorld) return;

      const mapShell = viewMap.querySelector('.universe-map-shell');

      const syncMapCanvasSize = () => {
        if (!mapShell) return;
        recalculateMapCanvasSize(mapShell.clientWidth, mapShell.clientHeight);
        mapCanvas.style.width = `${state.mapCanvas.width}px`;
        mapCanvas.style.height = `${state.mapCanvas.height}px`;
        mapWorld.style.width = `${state.mapCanvas.width}px`;
        mapWorld.style.height = `${state.mapCanvas.height}px`;
      };
      syncMapCanvasSize();

      const closePopup = () => {
        const popup = document.getElementById('mapPopup');
        popup?.remove();
      };

      const openPopupAt = (x, y) => {
        closePopup();
        const popup = document.createElement('div');
        popup.id = 'mapPopup';
        popup.className = 'map-popup';
        popup.style.left = `${Math.max(8, Math.min(x + 8, state.mapCanvas.width - 298))}px`;
        popup.style.top = `${Math.max(8, Math.min(y + 8, state.mapCanvas.height - 250))}px`;
        popup.innerHTML = `
          <form id="mapCreateForm">
            <label>Nombre del universo
              <input type="text" name="nombreUniverso" maxlength="80" required placeholder="Ej. One Piece">
            </label>
            <label>Portada</label>
            <div class="cover-mode" role="group" aria-label="Selector de portada">
              <button type="button" data-cover-mode="url" class="active">URL</button>
              <button type="button" data-cover-mode="file">+</button>
            </div>
            <div class="cover-input-group" data-cover-input="url">
              <input type="url" name="portadaUrl" placeholder="https://...">
            </div>
            <div class="cover-input-group" data-cover-input="file" hidden>
              <input type="file" name="portadaArchivo" accept="image/*">
            </div>
            <button type="submit">Crear Universo</button>
            <p class="popup-feedback" id="popupFeedback" aria-live="polite"></p>
          </form>
        `;
        popup.addEventListener('click', (event) => event.stopPropagation());
        mapWorld.appendChild(popup);
        setTimeout(() => document.addEventListener('click', closePopup, { once: true }), 0);

        const form = popup.querySelector('#mapCreateForm');
        const feedback = popup.querySelector('#popupFeedback');
        let coverMode = 'url';
        popup.querySelectorAll('[data-cover-mode]').forEach((modeBtn) => {
          modeBtn.addEventListener('click', () => {
            coverMode = modeBtn.dataset.coverMode || 'url';
            popup.querySelectorAll('[data-cover-mode]').forEach(btn => btn.classList.toggle('active', btn === modeBtn));
            popup.querySelectorAll('[data-cover-input]').forEach(group => {
              group.hidden = group.dataset.coverInput !== coverMode;
            });
          });
        });

        form?.addEventListener('submit', async (event) => {
          event.preventDefault();
          if (!feedback) return;
          feedback.style.color = '#ffd2d2';
          feedback.textContent = '';

          const formData = new FormData(form);
          const name = String(formData.get('nombreUniverso') || '').trim();
          if (!name) {
            feedback.textContent = 'El nombre es obligatorio.';
            return;
          }

          const normalized = normalizeUniverseName(name);
          const duplicate = state.universeNodes.some(node => normalizeUniverseName(node.name) === normalized);
          if (duplicate) {
            feedback.textContent = 'Ya existe un universo con ese nombre.';
            return;
          }

          const file = formData.get('portadaArchivo');
          const urlInput = String(formData.get('portadaUrl') || '');
          let cover = createPlaceholderCover(name);
          try {
            if (coverMode === 'file' && file instanceof File && file.size > 0) {
              if (!file.type.startsWith('image/')) throw new Error('El archivo seleccionado no es una imagen.');
              if (file.size > MAX_LOCAL_IMAGE_BYTES) throw new Error('La imagen supera el límite de 2MB.');
              cover = await fileToDataUrl(file);
            } else if (coverMode === 'url' && urlInput.trim()) {
              cover = validateCoverUrl(urlInput);
            }
          } catch (err) {
            feedback.textContent = err.message || 'No se pudo procesar la portada.';
            return;
          }

          const boundedX = Math.max(NODE_HALF_WIDTH, Math.min(Math.round(x), state.mapCanvas.width - NODE_HALF_WIDTH));
          const boundedY = Math.max(NODE_HALF_HEIGHT, Math.min(Math.round(y), state.mapCanvas.height - NODE_HALF_HEIGHT));
          const adjusted = resolveNodeCollision(boundedX, boundedY, state.universeNodes);
          state.universeNodes.push({
            id: cssSafe(`${name}-${Date.now()}`),
            name,
            cover,
            x: adjusted.x,
            y: adjusted.y,
            neighbors: [],
            shape: createNodeShape(hashCode(name))
          });
          syncMapCanvasSize();
          saveUniverseNodes();
          closePopup();
          renderMapView();
        });
      };

      viewMap.querySelectorAll('.universe-node').forEach(nodeEl => {
        const coverEl = nodeEl.querySelector('.universe-cover');
        coverEl?.addEventListener('error', () => {
          coverEl.classList.add('is-broken');
          coverEl.src = createPlaceholderCover(nodeEl.dataset.open);
        });
        nodeEl.addEventListener('click', (event) => {
          event.stopPropagation();
          state.universe = nodeEl.dataset.open;
          state.selectedVideoId = null;
          state.showAddForm = false;
          state.marathon = { active: false, queue: [], position: 0 };
          state.filters = { personaje: 'todos', actor: 'todos', rareza: 'todos' };
          changeView('universe');
        });
      });

      mapWorld.addEventListener('click', (event) => {
        event.stopPropagation();
        const rect = mapWorld.getBoundingClientRect();
        openPopupAt(event.clientX - rect.left, event.clientY - rect.top);
      });

      window.addEventListener('resize', syncMapCanvasSize, { once: true });
    }

    function renderUniverseView() {
      const videos = getUniverseVideos();
      const personajes = [...new Set(videos.map(v => v.personaje || 'Sin personaje'))];
      const actores = [...new Set(videos.map(v => v.actor_de_doblaje || 'Sin actor'))];
      const rarezas = ['Común', 'Raro', 'Épico', 'Legendario'];
      const filtered = getFilteredUniverseVideos();
      const selected = filtered.find(v => v.id === state.selectedVideoId) || filtered[0] || null;
      const universeNode = state.universeNodes.find(node => node.name === state.universe);
      const headerCover = getSafeUniverseCover(state.universe, universeNode?.cover || getUniverseCover(videos));
      viewUniverse.innerHTML = `
        <div class="actions">
          <button id="backMap">← Volver al mapa</button>
        </div>
        <section class="panel universe-header">
          <div class="universe-hero">
            <img src="${headerCover}" alt="Portada de ${state.universe}">
            <div>
              <h2>${state.universe || 'Universo'}</h2>
              <p class="muted">${videos.length} videos en total.</p>
            </div>
          </div>
          <div class="universe-controls">
            <button id="toggleAddVideo" class="primary-btn">AGREGAR VIDEO</button>
          </div>
        </section>

        <form id="addVideoForm" class="add-video-form" ${state.showAddForm ? '' : 'hidden'}>
          <label>URL de YouTube
            <input type="url" name="url_youtube" required placeholder="https://www.youtube.com/watch?v=...">
          </label>
          <label>Personaje (opcional)
            <input type="text" name="personaje" placeholder="Ej. Gokú">
          </label>
          <label>Actor de doblaje (opcional)
            <input type="text" name="actor_de_doblaje" placeholder="Ej. Mario Castañeda">
          </label>
          <label>Rareza
            <select name="rareza">
              ${rarezas.map(r => `<option value="${r}">${r}</option>`).join('')}
            </select>
          </label>
          <div class="actions">
            <button type="submit" class="primary-btn">Guardar</button>
            <span class="muted" id="videoFormFeedback"></span>
          </div>
        </form>

        <div class="universe-layout">
          <section class="panel">
            <div class="toolbar">
              <label>Personaje
                <select id="filterCharacter">
                  <option value="todos">Todos</option>
                  ${personajes.map(p => `<option value="${p}" ${state.filters.personaje === p ? 'selected' : ''}>${p}</option>`).join('')}
                </select>
              </label>
              <label>Actor de doblaje
                <select id="filterActor">
                  <option value="todos">Todos</option>
                  ${actores.map(a => `<option value="${a}" ${state.filters.actor === a ? 'selected' : ''}>${a}</option>`).join('')}
                </select>
              </label>
              <label>Rareza
                <select id="filterRarity">
                  <option value="todos">Todas</option>
                  ${rarezas.map(r => `<option value="${r}" ${state.filters.rareza === r ? 'selected' : ''}>${r}</option>`).join('')}
                </select>
              </label>
              <button id="clearFilters">Limpiar filtros</button>
            </div>

            <div class="video-grid">
              ${filtered.map(v => `
                <article class="card video-card" data-open-detail="${v.id}">
                  <img class="video-thumb" src="${v.thumbnail || getUniverseCover([v])}" alt="${v.titulo || 'Miniatura del video'}" loading="lazy">
                  <h3>${v.personaje || 'Personaje pendiente'}</h3>
                  <p>${v.actor_de_doblaje || 'Actor pendiente'}</p>
                  <p class="video-title">${v.titulo || 'Título no disponible'}</p>
                  <span class="badge ${rarityClass(v.rareza || 'Común')}">${v.rareza || 'Común'}</span>
                </article>
              `).join('') || '<p class="muted">No hay resultados con estos filtros.</p>'}
            </div>
          </section>

          <aside class="panel">
            <h3>Reproducción rápida</h3>
            <p class="muted">Selecciona una carta para abrir su vista detallada.</p>
            <div class="player-box">
              ${selected ? `<iframe id="videoPlayer" src="${toEmbedUrl(selected.url_youtube || selected.url_video, 1)}" title="Reproductor" allow="autoplay; encrypted-media" allowfullscreen></iframe>` : '<p class="muted">Sin video seleccionado</p>'}
            </div>
          </aside>
        </div>
      `;

      document.getElementById('backMap').onclick = () => changeView('map');
      document.getElementById('toggleAddVideo').onclick = () => {
        state.showAddForm = !state.showAddForm;
        renderUniverseView();
      };

      const addVideoForm = document.getElementById('addVideoForm');
      addVideoForm?.addEventListener('submit', async (event) => {
        event.preventDefault();
        const feedback = document.getElementById('videoFormFeedback');
        const formData = new FormData(addVideoForm);
        const urlInput = String(formData.get('url_youtube') || '').trim();
        const normalizedUrl = normalizeYoutubeUrl(urlInput);
        if (!normalizedUrl) {
          if (feedback) feedback.textContent = 'URL de YouTube inválida.';
          return;
        }
        if (feedback) feedback.textContent = 'Guardando...';
        const metadata = await fetchYoutubeMetadata(normalizedUrl);
        const newVideo = {
          id: `video-${Date.now()}`,
          universo: [state.universe],
          personaje: String(formData.get('personaje') || '').trim() || 'Sin personaje',
          actor_de_doblaje: String(formData.get('actor_de_doblaje') || '').trim() || 'Sin actor',
          url_youtube: normalizedUrl,
          thumbnail: metadata.thumbnail,
          titulo: metadata.title,
          rareza: String(formData.get('rareza') || 'Común')
        };
        VIDEOS.push(newVideo);
        state.showAddForm = false;
        state.selectedVideoId = newVideo.id;
        renderMapView();
        renderUniverseView();
      });

      document.getElementById('clearFilters').onclick = () => {
        state.filters = { personaje: 'todos', actor: 'todos', rareza: 'todos' };
        renderUniverseView();
      };

      document.getElementById('filterCharacter').onchange = (e) => { state.filters.personaje = e.target.value; renderUniverseView(); };
      document.getElementById('filterActor').onchange = (e) => { state.filters.actor = e.target.value; renderUniverseView(); };
      document.getElementById('filterRarity').onchange = (e) => { state.filters.rareza = e.target.value; renderUniverseView(); };

      viewUniverse.querySelectorAll('[data-open-detail]').forEach(card => {
        card.addEventListener('click', () => {
          const videoId = card.dataset.openDetail;
          state.selectedVideoId = videoId;
          openVideoDetail(videoId);
        });
      });

      attachPlayerEndedHandler();
    }

    function openVideoDetail(videoId) {
      const video = VIDEOS.find(v => v.id === videoId);
      if (!video) return;
      const personaje = video.personaje || 'Sin personaje';
      const actor = video.actor_de_doblaje || 'Sin actor';

      const universosRelacionados = [...new Set(
        VIDEOS.filter(v => (v.personaje || 'Sin personaje') === personaje)
          .flatMap(v => getVideoUniverses(v))
      )];
      const actoresDelPersonaje = [...new Set(
        VIDEOS.filter(v => (v.personaje || 'Sin personaje') === personaje)
          .map(v => v.actor_de_doblaje || 'Sin actor')
      )];
      const personajesDelActor = [...new Set(
        VIDEOS.filter(v => (v.actor_de_doblaje || 'Sin actor') === actor)
          .map(v => v.personaje || 'Sin personaje')
      )];

      const modal = document.createElement('section');
      modal.className = 'detail-modal';
      modal.innerHTML = `
        <article class="detail-content">
          <button class="detail-close" id="closeDetail">✕ Cerrar</button>
          <div class="detail-grid">
            <section class="panel">
              <h3>${personaje}</h3>
              <p><strong>Actor de doblaje:</strong> ${actor}</p>
              <span class="badge ${rarityClass(video.rareza || 'Común')}">${video.rareza || 'Común'}</span>
              <div class="player-box" style="margin-top:10px;">
                <iframe src="${toEmbedUrl(video.url_youtube || video.url_video, 1)}" title="Video detallado" allow="autoplay; encrypted-media" allowfullscreen></iframe>
              </div>
            </section>
            <aside class="panel">
              <h4>Universos relacionados</h4>
              <ul class="detail-list">${universosRelacionados.map(u => `<li>${u}</li>`).join('') || '<li>Sin datos</li>'}</ul>
              <h4>Actores del personaje</h4>
              <ul class="detail-list">${actoresDelPersonaje.map(a => `<li>${a}</li>`).join('') || '<li>Sin datos</li>'}</ul>
              <h4>Personajes del actor</h4>
              <ul class="detail-list">${personajesDelActor.map(p => `<li>${p}</li>`).join('') || '<li>Sin datos</li>'}</ul>
            </aside>
          </div>
        </article>
      `;
      modal.addEventListener('click', (event) => {
        if (event.target === modal) modal.remove();
      });
      document.body.appendChild(modal);
      modal.querySelector('#closeDetail')?.addEventListener('click', () => modal.remove());
    }

    function renderAchievementsView() {
      const universeMap = groupByUniverse();
      const universeCompleted = Object.values(universeMap).some(list => {
        const uniq = new Set(list.map(v => v.personaje)).size;
        return uniq >= 3;
      });
      const tenSameUniverse = Object.values(universeMap).some(list => new Set(list.map(v => v.personaje)).size >= 10);
      const fiveLegendary = VIDEOS.filter(v => v.rareza === 'Legendario').length >= 5;

      const achievements = [
        {
          title: 'Primer universo completado',
          description: 'Tener al menos 3 personajes distintos en un universo.',
          unlocked: universeCompleted
        },
        {
          title: '10 personajes de un mismo universo',
          description: 'Completa 10 personajes únicos dentro de un universo.',
          unlocked: tenSameUniverse
        },
        {
          title: '5 videos legendarios',
          description: 'Consigue 5 videos con rareza Legendario.',
          unlocked: fiveLegendary
        }
      ];

      viewAchievements.innerHTML = `
        <div class="panel achievements">
          ${achievements.map(a => `
            <article class="achievement ${a.unlocked ? 'done' : ''}">
              <h3>${a.unlocked ? '✅' : '🔒'} ${a.title}</h3>
              <p class="muted">${a.description}</p>
              <p>${a.unlocked ? 'Desbloqueado' : 'Pendiente'}</p>
            </article>
          `).join('')}
        </div>
      `;
    }

    function cssSafe(text) {
      return text.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '').replace(/[^a-z0-9]+/g, '-');
    }

    function startMarathon() {
      const queue = getFilteredUniverseVideos();
      if (!queue.length) return;
      state.marathon.active = true;
      state.marathon.queue = queue;
      state.marathon.position = 0;
      state.selectedVideoId = queue[0].id;
      renderUniverseView();
      updateMarathonLabel();
    }

    function nextInMarathon() {
      if (!state.marathon.active) return;
      if (state.marathon.position >= state.marathon.queue.length - 1) {
        state.marathon.active = false;
        updateMarathonLabel('Maratón finalizado.');
        return;
      }
      state.marathon.position += 1;
      const current = state.marathon.queue[state.marathon.position];
      state.selectedVideoId = current.id;
      renderUniverseView();
      updateMarathonLabel();
    }

    function updateMarathonLabel(override) {
      const el = document.getElementById('marathonState');
      if (!el) return;
      if (override) {
        el.textContent = override;
        return;
      }
      if (state.marathon.active) {
        el.textContent = `Reproduciendo ${state.marathon.position + 1} de ${state.marathon.queue.length}`;
      } else {
        el.textContent = 'Modo Maratón desactivado';
      }
    }

    function attachPlayerEndedHandler() {
      const iframe = document.getElementById('videoPlayer');
      if (!iframe) return;
      const currentUrl = new URL(iframe.src);
      const videoId = currentUrl.pathname.split('/').pop();

      // Fallback simple: avanza cada 12s en modo maratón si no se puede captar evento "ended" del reproductor embebido.
      // Esto mantiene la reproducción encadenada sin interacción adicional tras activar maratón.
      clearTimeout(window.__marathonFallback);
      if (state.marathon.active && videoId) {
        window.__marathonFallback = setTimeout(nextInMarathon, 12000);
      }
    }

    function changeView(next) {
      state.view = next;
      viewMap.classList.toggle('active', next === 'map');
      viewUniverse.classList.toggle('active', next === 'universe');
      viewAchievements.classList.toggle('active', next === 'achievements');
      document.querySelectorAll('.sidebar-nav .sidebar-item').forEach(btn => btn.classList.remove('active'));
      if (next === 'achievements') {
        navAchievements.classList.add('active');
      } else {
        navUniverses.classList.add('active');
      }

      if (next === 'map') renderMapView();
      if (next === 'universe') renderUniverseView();
      if (next === 'achievements') renderAchievementsView();
    }

    toggleSidebar.onclick = () => {
      appLayout.classList.toggle('sidebar-collapsed');
      toggleSidebar.textContent = appLayout.classList.contains('sidebar-collapsed') ? '➡️ Expandir menú' : '↔️ Colapsar menú';
    };

    const upcomingNavs = ['navInicio', 'navIndice', 'navMaraton', 'navRarezas', 'navActores', 'navVersiones', 'navFavoritos', 'navBuscar', 'navStats', 'navConfig'];
    upcomingNavs.forEach(id => {
      const btn = document.getElementById(id);
      if (!btn) return;
      btn.onclick = () => {
        alert('Esta sección está preparada en el menú y la activaremos en la siguiente etapa.');
      };
    });

    navUniverses.onclick = () => changeView(state.universe ? 'universe' : 'map');
    navAchievements.onclick = () => changeView('achievements');

    state.universeNodes = loadUniverseNodesFromStorage();
    changeView('map');
  </script>
</body>
</html>
