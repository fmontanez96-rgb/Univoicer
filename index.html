<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Colección de Saludos de Doblaje</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f7ff;
      --bg-soft: #ffffff;
      --panel: #ffffff;
      --panel-2: #f3f7ff;
      --text: #1f2a44;
      --muted: #556487;
      --line: #c8d3ea;
      --accent: #6a66f6;
      --accent-hover: #5448e8;
      --focus: #11b8cb;
      --ok: #179d6c;
      --ok-soft: #dff9ef;
      --rare-comun: #52617d;
      --rare-raro: #0f8d9e;
      --rare-epico: #7046df;
      --rare-legendario: #8a4b00;
      --shadow: 0 10px 24px rgba(53, 64, 114, .12);
      --shadow-soft: 0 6px 14px rgba(53, 64, 114, .1);
      --radius: 18px;
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; min-height: 100%; height: 100%; overflow: hidden; }

    body {
      font-family: "Nunito", Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      background:
        radial-gradient(circle at 12% 10%, rgba(163, 128, 255, .23), transparent 34%),
        radial-gradient(circle at 92% 18%, rgba(71, 212, 196, .2), transparent 34%),
        radial-gradient(circle at 54% 108%, rgba(255, 147, 133, .22), transparent 40%),
        var(--bg);
      color: var(--text);
      line-height: 1.5;
    }

    .app { width: 100%; height: 100vh; padding: 12px; }

    .layout {
      display: grid;
      grid-template-columns: 300px minmax(0, 1fr);
      gap: 18px;
      align-items: start;
      height: 100%;
    }

    .sidebar {
      position: sticky;
      top: 0;
      height: calc(100vh - 24px);
      overflow: auto;
      background: linear-gradient(140deg, rgba(31,42,79,.9), rgba(20,27,51,.95));
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 18px;
      box-shadow: var(--shadow);
      display: grid;
      gap: 14px;
    }

    .title {
      margin: 0;
      font-size: clamp(1.3rem, 1rem + 1.4vw, 2rem);
      letter-spacing: .2px;
      font-weight: 800;
      color: #26245f;
    }

    .subtitle { margin: 4px 0 0; color: var(--muted); }

    .sidebar-nav {
      display: grid;
      gap: 8px;
    }

    .sidebar-item {
      width: 100%;
      text-align: left;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .sidebar-item[disabled] {
      cursor: not-allowed;
      opacity: .55;
      transform: none;
    }

    .content {
      min-width: 0;
      display: grid;
      gap: 16px;
      height: calc(100vh - 24px);
      overflow: auto;
    }
    .sidebar-toggle { margin-top: 4px; }
    .sidebar-label { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .sidebar-emoji { width: 22px; text-align: center; flex: none; }
    .layout.sidebar-collapsed { grid-template-columns: 86px minmax(0, 1fr); }
    .layout.sidebar-collapsed .sidebar { padding: 14px 10px; }
    .layout.sidebar-collapsed .sidebar-copy,
    .layout.sidebar-collapsed .sidebar-label { display: none; }
    .layout.sidebar-collapsed .sidebar-item { justify-content: center; padding-inline: 6px; }

    button, select {
      border: 1px solid var(--line);
      background: var(--panel);
      color: var(--text);
      border-radius: 12px;
      padding: 10px 14px;
      font: inherit;
      cursor: pointer;
      transition: transform .25s ease, border-color .25s ease, box-shadow .25s ease, background-color .25s ease;
    }

    button:hover, select:hover {
      transform: translateY(-1px);
      border-color: var(--accent);
      box-shadow: var(--shadow-soft);
      background: #f8f8ff;
    }
    button:active, select:active { transform: translateY(0); box-shadow: 0 2px 8px rgba(53, 64, 114, .18) inset; }
    button:focus-visible, select:focus-visible { outline: 3px solid color-mix(in srgb, var(--focus) 38%, white); outline-offset: 2px; }
    button.active { border-color: var(--accent); box-shadow: 0 0 0 3px color-mix(in srgb, var(--accent) 28%, white); background: #f5f3ff; }

    .view { display: none; }
    .view.active { display: block; animation: fade .25s ease; }

    @keyframes fade { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 16px;
    }

    .universe-map-shell {
      position: relative;
      width: 100%;
      height: calc(100vh - 24px);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: rgba(20, 27, 51, 0.86);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    #universeMapCanvas {
      position: relative;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background:
        radial-gradient(circle at 15% 20%, rgba(89, 208, 255, .16), transparent 32%),
        radial-gradient(circle at 85% 10%, rgba(167, 139, 250, .16), transparent 30%),
        radial-gradient(circle at 20% 80%, rgba(126, 231, 135, .08), transparent 28%),
        linear-gradient(165deg, rgba(11,16,32,.9), rgba(20,27,51,.95));
    }

    .map-world {
      position: relative;
      width: 100%;
      height: 100%;
    }

    .universe-node {
      --w: 220px;
      --h: 150px;
      position: absolute;
      width: var(--w);
      height: var(--h);
      border: 1px solid rgba(160, 182, 255, .4);
      box-shadow: var(--shadow);
      overflow: hidden;
      background: linear-gradient(155deg, rgba(31,42,79,.96), rgba(20,27,51,.98));
      transition: transform .2s ease, border-color .2s ease, box-shadow .2s ease;
      z-index: 2;
      cursor: pointer;
    }

    .universe-node::before {
      content: '';
      position: absolute;
      inset: -20% 0 auto;
      height: 58%;
      background: radial-gradient(circle at center, rgba(255,255,255,.26), transparent 70%);
      pointer-events: none;
      opacity: .6;
    }

    .universe-node:hover {
      transform: translateY(-4px) scale(1.02);
      border-color: var(--accent);
      box-shadow: 0 0 0 2px rgba(89, 208, 255, .22), var(--shadow);
    }

    .universe-node .universe-cover {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      filter: saturate(1.15) contrast(1.05) brightness(.85);
      opacity: .64;
    }

    .universe-node .cover-fallback {
      position: absolute;
      inset: 0;
      display: none;
      background: linear-gradient(145deg, rgba(89,208,255,.3), rgba(167,139,250,.3));
      color: #eef5ff;
      padding: 10px;
      font-size: .86rem;
      align-items: end;
    }

    .universe-node .universe-cover.is-broken + .cover-fallback {
      display: flex;
    }

    .universe-node .node-info {
      position: absolute;
      left: 12px;
      right: 12px;
      bottom: 10px;
      z-index: 2;
    }

    .universe-node h3 {
      margin: 0;
      font-size: .97rem;
      text-shadow: 0 2px 10px rgba(0, 0, 0, .8);
    }

    .map-popup {
      position: absolute;
      width: min(290px, 88vw);
      border-radius: 14px;
      border: 1px solid rgba(134, 168, 255, .45);
      background: rgba(22, 30, 56, .97);
      box-shadow: var(--shadow);
      padding: 12px;
      z-index: 8;
      animation: popupIn .18s ease;
    }

    .map-popup form { display: grid; gap: 8px; }
    .map-popup label { display: grid; gap: 4px; color: #d8e8ff; font-size: .85rem; }
    .cover-mode-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      align-items: end;
    }
    .cover-mode-row select {
      border: 1px solid rgba(147, 175, 255, .45);
      background: rgba(240, 245, 255, .98);
      color: #1f2a44;
      border-radius: 10px;
      padding: 9px 10px;
      font: inherit;
    }
    .map-popup input {
      border: 1px solid rgba(147, 175, 255, .45);
      background: rgba(240, 245, 255, .98);
      color: #1f2a44;
      border-radius: 10px;
      padding: 9px 10px;
      font: inherit;
    }
    .map-popup .popup-feedback { min-height: 16px; font-size: .8rem; color: #ffd2d2; margin: 0; }
    .map-popup button[type="submit"] {
      background: var(--accent);
      color: #fff;
      border-color: color-mix(in srgb, var(--accent) 68%, white);
    }
    .map-popup button[type="submit"]:hover { background: var(--accent-hover); }

    @keyframes popupIn {
      from { opacity: 0; transform: translateY(6px) scale(.96); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    .universe-node p {
      margin: 4px 0 0;
      font-size: .8rem;
      color: #d8e8ff;
      text-shadow: 0 2px 10px rgba(0, 0, 0, .8);
    }

    .card {
      background: linear-gradient(158deg, var(--panel), var(--panel-2));
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 16px;
      box-shadow: var(--shadow);
      transition: transform .25s ease, border-color .25s ease, box-shadow .25s ease;
    }

    .card:hover { transform: translateY(-3px); border-color: color-mix(in srgb, var(--accent) 58%, white); box-shadow: 0 14px 28px rgba(71, 54, 130, .16); }

    .universe-name { margin: 0 0 8px; font-size: 1.05rem; }
    .muted { color: var(--muted); font-size: .95rem; }

    .universe-layout {
      display: grid;
      grid-template-columns: minmax(0, 2fr) minmax(260px, 1fr);
      gap: 16px;
    }

    .panel, .sidebar {
      background: linear-gradient(160deg, rgba(255,255,255,.95), rgba(244,249,255,.98));
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 16px;
      box-shadow: var(--shadow-soft);
    }

    .toolbar {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr)) auto;
      gap: 10px;
      align-items: end;
      margin-bottom: 14px;
    }

    .toolbar label { display: grid; gap: 6px; font-size: .9rem; color: var(--muted); }

    .video-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 14px;
    }

    .video-card h3 { margin: 0 0 6px; font-size: 1rem; }
    .video-card p { margin: 0; color: var(--muted); font-size: .92rem; }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border-radius: 999px;
      padding: 4px 10px;
      font-size: .79rem;
      margin-top: 10px;
      border: 1px solid transparent;
      font-weight: 700;
      letter-spacing: .2px;
    }

    .rare-comun { background: rgba(82,97,125,.12); color: var(--rare-comun); border-color: rgba(82,97,125,.35); }
    .rare-raro { background: rgba(15,141,158,.13); color: var(--rare-raro); border-color: rgba(15,141,158,.36); }
    .rare-epico { background: rgba(112,70,223,.13); color: var(--rare-epico); border-color: rgba(112,70,223,.35); }
    .rare-legendario { background: rgba(185,108,0,.14); color: var(--rare-legendario); border-color: rgba(185,108,0,.36); }

    .actions { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 12px; }

    .player-box {
      margin-top: 14px;
      border: 1px solid var(--line);
      border-radius: 16px;
      overflow: hidden;
      background: #eef2fd;
    }

    iframe { width: 100%; aspect-ratio: 16/9; border: 0; display: block; }

    .index-list { display: grid; gap: 8px; max-height: 460px; overflow: auto; }
    .index-row {
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(255,255,255,.85);
      transition: border-color .25s ease, transform .25s ease, box-shadow .25s ease;
    }
    .index-row:hover { border-color: color-mix(in srgb, var(--accent) 40%, white); transform: translateY(-1px); box-shadow: var(--shadow-soft); }

    .marathon {
      margin-top: 10px;
      padding: 10px 12px;
      border-radius: 12px;
      background: color-mix(in srgb, var(--focus) 14%, white);
      color: #0e5460;
      border: 1px solid color-mix(in srgb, var(--focus) 42%, white);
      font-size: .9rem;
    }

    details { margin-top: 10px; }
    details summary { cursor: pointer; color: #364164; }
    .version-list { display: grid; gap: 8px; margin-top: 8px; }

    .achievements { display: grid; gap: 10px; }
    .achievement {
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 12px;
      background: rgba(255,255,255,.9);
      box-shadow: var(--shadow-soft);
    }
    .achievement.done { border-color: color-mix(in srgb, var(--ok) 48%, white); background: var(--ok-soft); }

    @media (max-width: 960px) {
      .layout { grid-template-columns: 1fr; }
      .sidebar {
        position: static;
        height: auto;
      }
      .sidebar-nav {
        grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      }
      .universe-layout { grid-template-columns: 1fr; }
      .toolbar { grid-template-columns: 1fr; }
      .content { height: auto; }
      html, body { overflow: auto; }
    }
  </style>
</head>
<body>
  <main class="app">
    <div class="layout" id="appLayout">
      <aside class="sidebar" aria-label="Menú principal">
        <div class="sidebar-copy">
          <h1 class="title">🎙️ Colección de Saludos de Doblaje</h1>
          <p class="subtitle">Explora universos, personajes, rarezas y desbloquea logros.</p>
        </div>
        <button id="toggleSidebar" class="sidebar-toggle">↔️ Colapsar menú</button>
        <nav class="sidebar-nav">
          <button id="navInicio" class="sidebar-item"><span class="sidebar-emoji">🏠</span><span class="sidebar-label">1. Inicio</span></button>
          <button id="navUniverses" class="sidebar-item active"><span class="sidebar-emoji">🪐</span><span class="sidebar-label">2. Universos</span></button>
          <button id="navIndice" class="sidebar-item"><span class="sidebar-emoji">📚</span><span class="sidebar-label">3. Índice</span></button>
          <button id="navMaraton" class="sidebar-item"><span class="sidebar-emoji">🎬</span><span class="sidebar-label">4. Maratón</span></button>
          <button id="navRarezas" class="sidebar-item"><span class="sidebar-emoji">💎</span><span class="sidebar-label">5. Rarezas</span></button>
          <button id="navActores" class="sidebar-item"><span class="sidebar-emoji">🎙️</span><span class="sidebar-label">6. Actores</span></button>
          <button id="navVersiones" class="sidebar-item"><span class="sidebar-emoji">🧬</span><span class="sidebar-label">7. Versiones</span></button>
          <button id="navAchievements" class="sidebar-item"><span class="sidebar-emoji">🏆</span><span class="sidebar-label">8. Logros</span></button>
          <button id="navFavoritos" class="sidebar-item"><span class="sidebar-emoji">⭐</span><span class="sidebar-label">9. Favoritos</span></button>
          <button id="navBuscar" class="sidebar-item"><span class="sidebar-emoji">🔎</span><span class="sidebar-label">10. Buscar</span></button>
          <button id="navStats" class="sidebar-item"><span class="sidebar-emoji">📈</span><span class="sidebar-label">11. Estadísticas</span></button>
          <button id="navConfig" class="sidebar-item"><span class="sidebar-emoji">⚙️</span><span class="sidebar-label">12. Configuración</span></button>
        </nav>
      </aside>

      <section class="content">
        <section id="viewMap" class="view active"></section>
        <section id="viewUniverse" class="view"></section>
        <section id="viewAchievements" class="view"></section>
      </section>
    </div>
  </main>

  <script>
    const VIDEOS = [];

    const state = {
      view: 'map',
      universe: null,
      filters: { personaje: 'todos', actor: 'todos', rareza: 'todos' },
      selectedVideoId: null,
      marathon: { active: false, queue: [], position: 0 },
      universeNodes: [],
      mapCanvas: { width: 1400, height: 900 }
    };
    const UNIVERSES_STORAGE_KEY = 'universes_map_v1';
    const MAX_LOCAL_IMAGE_BYTES = 2 * 1024 * 1024;

    const appLayout = document.getElementById('appLayout');
    const toggleSidebar = document.getElementById('toggleSidebar');
    const navUniverses = document.getElementById('navUniverses');
    const navAchievements = document.getElementById('navAchievements');
    const viewMap = document.getElementById('viewMap');
    const viewUniverse = document.getElementById('viewUniverse');
    const viewAchievements = document.getElementById('viewAchievements');

    function rarityClass(rareza) {
      return `rare-${rareza.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '')}`;
    }

    function toEmbedUrl(url, autoplay = 0) {
      const match = url.match(/(?:v=|\.be\/)([A-Za-z0-9_-]{11})/);
      const id = match ? match[1] : '';
      return `https://www.youtube.com/embed/${id}?rel=0&modestbranding=1&autoplay=${autoplay}&enablejsapi=1`;
    }

    function groupByUniverse() {
      return VIDEOS.reduce((acc, item) => {
        acc[item.universo] = acc[item.universo] || [];
        acc[item.universo].push(item);
        return acc;
      }, {});
    }

    function normalizeUniverseName(name) {
      return name.trim().toLowerCase();
    }

    function createPlaceholderCover(name) {
      const label = encodeURIComponent((name || 'UNIVERSO').slice(0, 18).toUpperCase());
      return `data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 400 280'><defs><linearGradient id='g' x1='0' y1='0' x2='1' y2='1'><stop offset='0%' stop-color='%2359d0ff'/><stop offset='100%' stop-color='%23a78bfa'/></linearGradient></defs><rect width='400' height='280' fill='%23111a34'/><rect x='14' y='14' width='372' height='252' rx='18' fill='url(%23g)' opacity='.4'/><text x='200' y='150' font-size='30' font-family='Arial, sans-serif' text-anchor='middle' fill='white'>${label}</text></svg>`;
    }

    function getSafeUniverseCover(name, cover) {
      return cover || createPlaceholderCover(name);
    }

    function validateCoverUrl(urlText) {
      if (!urlText?.trim()) return '';
      try {
        const parsed = new URL(urlText.trim());
        if (!['http:', 'https:'].includes(parsed.protocol)) {
          throw new Error('Protocolo no permitido');
        }
        return parsed.toString();
      } catch (_) {
        throw new Error('La URL de portada no es válida');
      }
    }

    function fileToDataUrl(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(String(reader.result || ''));
        reader.onerror = () => reject(new Error('No fue posible leer la imagen local.'));
        reader.readAsDataURL(file);
      });
    }

    function saveUniverseNodes() {
      localStorage.setItem(UNIVERSES_STORAGE_KEY, JSON.stringify(state.universeNodes));
    }

    function loadUniverseNodesFromStorage() {
      try {
        const raw = localStorage.getItem(UNIVERSES_STORAGE_KEY);
        if (!raw) return [];
        const parsed = JSON.parse(raw);
        if (!Array.isArray(parsed)) return [];
        return parsed
          .filter(node => node && typeof node.name === 'string')
          .map((node, idx) => ({
            id: node.id || cssSafe(node.name) || `universo-${idx}`,
            name: node.name.trim(),
            cover: typeof node.cover === 'string' ? node.cover : '',
            x: Number(node.x) || 220 + (idx * 80),
            y: Number(node.y) || 220 + (idx * 60),
            neighbors: Array.isArray(node.neighbors) ? node.neighbors.filter(Boolean) : [],
            shape: node.shape || createNodeShape(hashCode(node.name))
          }));
      } catch (_) {
        return [];
      }
    }

    function getUniverseVideos() {
      return VIDEOS.filter(v => v.universo === state.universe);
    }

    function getFilteredUniverseVideos() {
      return getUniverseVideos().filter(v => {
        const m1 = state.filters.personaje === 'todos' || v.personaje === state.filters.personaje;
        const m2 = state.filters.actor === 'todos' || v.actor_de_doblaje === state.filters.actor;
        const m3 = state.filters.rareza === 'todos' || v.rareza === state.filters.rareza;
        return m1 && m2 && m3;
      });
    }

    function getCharactersIndex(videos) {
      const grouped = videos.reduce((acc, v) => {
        acc[v.personaje] = acc[v.personaje] || [];
        acc[v.personaje].push(v);
        return acc;
      }, {});
      return Object.entries(grouped).map(([personaje, versions]) => ({ personaje, versions }));
    }

    function hashCode(text) {
      return [...text].reduce((acc, ch) => ((acc * 31) + ch.charCodeAt(0)) >>> 0, 7);
    }

    function getUniverseCover(videos) {
      const first = videos?.[0];
      if (!first) return '';
      const embed = toEmbedUrl(first.url_video);
      const videoId = embed.split('/embed/')[1]?.split('?')[0];
      return videoId ? `https://i.ytimg.com/vi/${videoId}/hqdefault.jpg` : '';
    }

    function createNodeShape(seed) {
      const pick = (min, max, shift) => min + ((seed >> shift) % (max - min + 1));
      return `${pick(42, 58, 2)}% ${pick(35, 62, 5)}% ${pick(44, 60, 8)}% ${pick(36, 62, 11)}% / ${pick(42, 64, 14)}% ${pick(36, 60, 17)}% ${pick(38, 62, 20)}% ${pick(36, 62, 23)}%`;
    }

    function findPlacementForNode(existingNodes, canvas, seed) {
      const minDistance = 230;
      const margin = 140;
      const candidateAngles = 12;
      const radii = [220, 310, 400, 490];
      const sortedAnchors = [...existingNodes].sort((a, b) => a.neighbors.length - b.neighbors.length);

      const isValidPoint = (x, y) => {
        if (x < margin || y < margin || x > canvas.width - margin || y > canvas.height - margin) return false;
        return existingNodes.every(node => Math.hypot(node.x - x, node.y - y) >= minDistance);
      };

      for (const anchor of sortedAnchors) {
        for (const radius of radii) {
          for (let i = 0; i < candidateAngles; i += 1) {
            const baseAngle = (Math.PI * 2 * i) / candidateAngles;
            const jitter = (((seed + i * 13 + radius) % 27) - 13) * (Math.PI / 180);
            const angle = baseAngle + jitter;
            const x = Math.round(anchor.x + Math.cos(angle) * radius);
            const y = Math.round(anchor.y + Math.sin(angle) * radius);
            if (isValidPoint(x, y)) {
              return { x, y, anchorId: anchor.id };
            }
          }
        }
      }
      return null;
    }

    function ensureUniverseNodes() {
      const universeMap = groupByUniverse();
      const names = Array.from(new Set([...Object.keys(universeMap), ...state.universeNodes.map(node => node.name)]));
      if (!names.length) return;

      const existingByName = new Map(state.universeNodes.map(node => [normalizeUniverseName(node.name), node]));

      if (!state.universeNodes.length && names.length) {
        const firstName = names[0];
        const firstSeed = hashCode(firstName);
        state.universeNodes.push({
          id: cssSafe(firstName),
          name: firstName,
          cover: getSafeUniverseCover(firstName, getUniverseCover(universeMap[firstName])),
          x: Math.round(state.mapCanvas.width / 2),
          y: Math.round(state.mapCanvas.height / 2),
          neighbors: [],
          shape: createNodeShape(firstSeed)
        });
      }

      names.forEach((name) => {
        const normalized = normalizeUniverseName(name);
        if (existingByName.has(normalized) || state.universeNodes.some(node => normalizeUniverseName(node.name) === normalized)) return;
        const seed = hashCode(name);
        let placement = findPlacementForNode(state.universeNodes, state.mapCanvas, seed);
        let safety = 0;
        while (!placement && safety < 5) {
          state.mapCanvas.width += 360;
          state.mapCanvas.height += 240;
          placement = findPlacementForNode(state.universeNodes, state.mapCanvas, seed + safety);
          safety += 1;
        }
        const fallbackX = state.mapCanvas.width - 180 - (seed % 120);
        const fallbackY = state.mapCanvas.height - 180 - ((seed >> 3) % 120);
        const point = placement || {
          x: Math.max(160, fallbackX),
          y: Math.max(160, fallbackY),
          anchorId: state.universeNodes[0]?.id
        };

        state.universeNodes.push({
          id: cssSafe(name),
          name,
          cover: getSafeUniverseCover(name, getUniverseCover(universeMap[name])),
          x: point.x,
          y: point.y,
          neighbors: point.anchorId ? [point.anchorId] : [],
          shape: createNodeShape(seed)
        });

        if (point.anchorId) {
          const anchor = state.universeNodes.find(node => node.id === point.anchorId);
          if (anchor && !anchor.neighbors.includes(cssSafe(name))) {
            anchor.neighbors.push(cssSafe(name));
          }
        }
      });
      state.universeNodes.forEach(node => {
        if (!node.cover && universeMap[node.name]) {
          node.cover = getSafeUniverseCover(node.name, getUniverseCover(universeMap[node.name]));
        } else if (!node.cover) {
          node.cover = createPlaceholderCover(node.name);
        }
      });
      saveUniverseNodes();
    }

    function renderMapView() {
      const universes = groupByUniverse();
      ensureUniverseNodes();
      const nodeHalfWidth = 110;
      const nodeHalfHeight = 75;

      const nodesMarkup = state.universeNodes.map(node => {
        const videos = universes[node.name] || [];
        return `
          <button class="universe-node" data-node-id="${node.id}" data-open="${node.name}" style="left:${node.x - nodeHalfWidth}px; top:${node.y - nodeHalfHeight}px; border-radius:${node.shape};">
            <img class="universe-cover" src="${getSafeUniverseCover(node.name, node.cover)}" alt="Portada de ${node.name}" loading="lazy">
            <span class="cover-fallback">Portada no disponible</span>
            <span class="node-info">
              <h3>${node.name}</h3>
              <p>${videos.length} videos</p>
            </span>
          </button>
        `;
      }).join('');

      viewMap.innerHTML = `
        <div class="universe-map-shell">
          <div id="universeMapCanvas">
            <div class="map-world" id="mapWorld">
              ${nodesMarkup}
            </div>
          </div>
        </div>
      `;

      const mapCanvas = document.getElementById('universeMapCanvas');
      const mapWorld = document.getElementById('mapWorld');
      if (!mapCanvas || !mapWorld) return;

      const syncMapCanvasSize = () => {
        const rect = mapCanvas.getBoundingClientRect();
        state.mapCanvas.width = Math.max(320, Math.floor(rect.width));
        state.mapCanvas.height = Math.max(320, Math.floor(rect.height));
      };
      syncMapCanvasSize();

      const closePopup = () => {
        const popup = document.getElementById('mapPopup');
        popup?.remove();
      };

      const openPopupAt = (x, y) => {
        closePopup();
        const popup = document.createElement('div');
        popup.id = 'mapPopup';
        popup.className = 'map-popup';
        popup.style.left = `${Math.max(8, Math.min(x + 8, state.mapCanvas.width - 298))}px`;
        popup.style.top = `${Math.max(8, Math.min(y + 8, state.mapCanvas.height - 250))}px`;
        popup.innerHTML = `
          <form id="mapCreateForm">
            <label>Nombre del universo
              <input type="text" name="nombreUniverso" maxlength="80" required placeholder="Ej. One Piece">
            </label>
            <div class="cover-mode-row">
              <label>Tipo de portada
                <select name="coverMode" id="coverMode">
                  <option value="url">URL</option>
                  <option value="file">+</option>
                </select>
              </label>
            </div>
            <label id="urlField">URL de portada
              <input type="url" name="portadaUrl" placeholder="https://...">
            </label>
            <label id="fileField" hidden>Imagen desde escritorio
              <input type="file" name="portadaArchivo" accept="image/*">
            </label>
            <button type="submit">Crear Universo</button>
            <p class="popup-feedback" id="popupFeedback" aria-live="polite"></p>
          </form>
        `;
        popup.addEventListener('click', (event) => event.stopPropagation());
        mapWorld.appendChild(popup);
        setTimeout(() => document.addEventListener('click', closePopup, { once: true }), 0);

        const form = popup.querySelector('#mapCreateForm');
        const feedback = popup.querySelector('#popupFeedback');
        const coverMode = popup.querySelector('#coverMode');
        const urlField = popup.querySelector('#urlField');
        const fileField = popup.querySelector('#fileField');
        const urlInputEl = popup.querySelector('input[name="portadaUrl"]');
        const fileInputEl = popup.querySelector('input[name="portadaArchivo"]');
        const updateCoverMode = () => {
          const mode = coverMode?.value || 'url';
          if (urlField && fileField) {
            urlField.hidden = mode !== 'url';
            fileField.hidden = mode !== 'file';
          }
          if (urlInputEl) urlInputEl.value = mode === 'url' ? urlInputEl.value : '';
          if (fileInputEl && mode === 'url') fileInputEl.value = '';
        };
        coverMode?.addEventListener('change', updateCoverMode);
        updateCoverMode();

        form?.addEventListener('submit', async (event) => {
          event.preventDefault();
          if (!feedback) return;
          feedback.style.color = '#ffd2d2';
          feedback.textContent = '';

          const formData = new FormData(form);
          const name = String(formData.get('nombreUniverso') || '').trim();
          if (!name) {
            feedback.textContent = 'El nombre es obligatorio.';
            return;
          }

          const normalized = normalizeUniverseName(name);
          const duplicate = state.universeNodes.some(node => normalizeUniverseName(node.name) === normalized);
          if (duplicate) {
            feedback.textContent = 'Ya existe un universo con ese nombre.';
            return;
          }

          const mode = String(formData.get('coverMode') || 'url');
          const file = formData.get('portadaArchivo');
          const urlInput = String(formData.get('portadaUrl') || '');
          let cover = createPlaceholderCover(name);
          try {
            if (mode === 'file') {
              if (!(file instanceof File) || file.size === 0) {
                throw new Error('Selecciona una imagen de escritorio para continuar.');
              }
              if (!file.type.startsWith('image/')) throw new Error('El archivo seleccionado no es una imagen.');
              if (file.size > MAX_LOCAL_IMAGE_BYTES) throw new Error('La imagen supera el límite de 2MB.');
              cover = await fileToDataUrl(file);
            } else if (urlInput.trim()) {
              cover = validateCoverUrl(urlInput);
            }
          } catch (err) {
            feedback.textContent = err.message || 'No se pudo procesar la portada.';
            return;
          }

          const boundedX = Math.max(nodeHalfWidth, Math.min(Math.round(x), state.mapCanvas.width - nodeHalfWidth));
          const boundedY = Math.max(nodeHalfHeight, Math.min(Math.round(y), state.mapCanvas.height - nodeHalfHeight));
          state.universeNodes.push({
            id: cssSafe(`${name}-${Date.now()}`),
            name,
            cover,
            x: boundedX,
            y: boundedY,
            neighbors: [],
            shape: createNodeShape(hashCode(name))
          });
          saveUniverseNodes();
          closePopup();
          renderMapView();
        });
      };

      viewMap.querySelectorAll('.universe-node').forEach(nodeEl => {
        const coverEl = nodeEl.querySelector('.universe-cover');
        coverEl?.addEventListener('error', () => {
          coverEl.classList.add('is-broken');
          coverEl.src = createPlaceholderCover(nodeEl.dataset.open);
        });
        nodeEl.addEventListener('click', (event) => {
          event.stopPropagation();
          state.universe = nodeEl.dataset.open;
          state.selectedVideoId = null;
          state.marathon = { active: false, queue: [], position: 0 };
          state.filters = { personaje: 'todos', actor: 'todos', rareza: 'todos' };
          changeView('universe');
        });
      });

      mapWorld.addEventListener('click', (event) => {
        event.stopPropagation();
        const rect = mapWorld.getBoundingClientRect();
        openPopupAt(event.clientX - rect.left, event.clientY - rect.top);
      });

      window.addEventListener('resize', syncMapCanvasSize, { once: true });
    }

    function renderUniverseView() {
      const videos = getUniverseVideos();
      if (!videos.length) {
        viewUniverse.innerHTML = `
          <div class="panel">
            <h2>${state.universe || 'Universo'}</h2>
            <p class="muted">Todavía no hay videos cargados en este universo.</p>
            <button id="backMap">← Volver al mapa</button>
          </div>
        `;
        document.getElementById('backMap').onclick = () => changeView('map');
        return;
      }

      const personajes = [...new Set(videos.map(v => v.personaje))];
      const actores = [...new Set(videos.map(v => v.actor_de_doblaje))];
      const rarezas = ['Común', 'Raro', 'Épico', 'Legendario'];
      const filtered = getFilteredUniverseVideos();
      const groupedCharacters = getCharactersIndex(filtered);
      const selected = filtered.find(v => v.id === state.selectedVideoId) || filtered[0];

      const videoCards = groupedCharacters.map(group => {
        const top = group.versions[0];
        const versionsMarkup = group.versions.map(v => `
          <button data-play="${v.id}">▶ ${v.version || 'Versión base'} · ${v.actor_de_doblaje}</button>
        `).join('');

        return `
          <article class="card video-card" id="char-${cssSafe(group.personaje)}">
            <h3>${group.personaje}</h3>
            <p>Actor base: ${top.actor_de_doblaje}</p>
            <span class="badge ${rarityClass(top.rareza)}">${top.rareza}</span>
            <details>
              <summary>Ver versiones (${group.versions.length})</summary>
              <div class="version-list">${versionsMarkup}</div>
            </details>
          </article>
        `;
      }).join('');

      const indexRows = getCharactersIndex(videos).map(group => `
        <div class="index-row">
          <span>${group.personaje}</span>
          <button data-jump="${cssSafe(group.personaje)}">${group.versions.length} versiones</button>
        </div>
      `).join('');

      const marathonText = state.marathon.active
        ? `Reproduciendo ${state.marathon.position + 1} de ${state.marathon.queue.length}`
        : 'Modo Maratón desactivado';

      viewUniverse.innerHTML = `
        <div class="actions">
          <button id="backMap">← Volver al mapa</button>
          <button id="startMarathon">Modo Maratón</button>
        </div>
        <h2>${state.universe}</h2>
        <p class="muted">${videos.length} videos cargados en este universo.</p>

        <div class="universe-layout">
          <section class="panel">
            <div class="toolbar">
              <label>Personaje
                <select id="filterCharacter">
                  <option value="todos">Todos</option>
                  ${personajes.map(p => `<option value="${p}" ${state.filters.personaje === p ? 'selected' : ''}>${p}</option>`).join('')}
                </select>
              </label>
              <label>Actor de doblaje
                <select id="filterActor">
                  <option value="todos">Todos</option>
                  ${actores.map(a => `<option value="${a}" ${state.filters.actor === a ? 'selected' : ''}>${a}</option>`).join('')}
                </select>
              </label>
              <label>Rareza
                <select id="filterRarity">
                  <option value="todos">Todas</option>
                  ${rarezas.map(r => `<option value="${r}" ${state.filters.rareza === r ? 'selected' : ''}>${r}</option>`).join('')}
                </select>
              </label>
              <button id="clearFilters">Limpiar filtros</button>
            </div>

            <div class="video-grid">${videoCards || '<p class="muted">No hay resultados con estos filtros.</p>'}</div>

            <div class="player-box">
              ${selected ? `<iframe id="videoPlayer" src="${toEmbedUrl(selected.url_video, 1)}" title="Reproductor" allow="autoplay; encrypted-media" allowfullscreen></iframe>` : '<p class="muted">Sin video seleccionado</p>'}
            </div>
            <div class="marathon" id="marathonState">${marathonText}</div>
          </section>

          <aside class="panel">
            <h3>Índice del universo</h3>
            <p class="muted">Navega rápido por personaje y cantidad de versiones.</p>
            <div class="index-list">${indexRows}</div>
          </aside>
        </div>
      `;

      document.getElementById('backMap').onclick = () => changeView('map');
      document.getElementById('startMarathon').onclick = startMarathon;
      document.getElementById('clearFilters').onclick = () => {
        state.filters = { personaje: 'todos', actor: 'todos', rareza: 'todos' };
        state.marathon = { active: false, queue: [], position: 0 };
        renderUniverseView();
      };

      document.getElementById('filterCharacter').onchange = (e) => { state.filters.personaje = e.target.value; state.marathon.active = false; renderUniverseView(); };
      document.getElementById('filterActor').onchange = (e) => { state.filters.actor = e.target.value; state.marathon.active = false; renderUniverseView(); };
      document.getElementById('filterRarity').onchange = (e) => { state.filters.rareza = e.target.value; state.marathon.active = false; renderUniverseView(); };

      viewUniverse.querySelectorAll('button[data-play]').forEach(btn => {
        btn.addEventListener('click', () => {
          state.selectedVideoId = btn.dataset.play;
          state.marathon.active = false;
          renderUniverseView();
        });
      });

      viewUniverse.querySelectorAll('button[data-jump]').forEach(btn => {
        btn.addEventListener('click', () => {
          document.getElementById(`char-${btn.dataset.jump}`)?.scrollIntoView({ behavior: 'smooth', block: 'center' });
        });
      });

      attachPlayerEndedHandler();
    }

    function renderAchievementsView() {
      const universeMap = groupByUniverse();
      const universeCompleted = Object.values(universeMap).some(list => {
        const uniq = new Set(list.map(v => v.personaje)).size;
        return uniq >= 3;
      });
      const tenSameUniverse = Object.values(universeMap).some(list => new Set(list.map(v => v.personaje)).size >= 10);
      const fiveLegendary = VIDEOS.filter(v => v.rareza === 'Legendario').length >= 5;

      const achievements = [
        {
          title: 'Primer universo completado',
          description: 'Tener al menos 3 personajes distintos en un universo.',
          unlocked: universeCompleted
        },
        {
          title: '10 personajes de un mismo universo',
          description: 'Completa 10 personajes únicos dentro de un universo.',
          unlocked: tenSameUniverse
        },
        {
          title: '5 videos legendarios',
          description: 'Consigue 5 videos con rareza Legendario.',
          unlocked: fiveLegendary
        }
      ];

      viewAchievements.innerHTML = `
        <div class="panel achievements">
          ${achievements.map(a => `
            <article class="achievement ${a.unlocked ? 'done' : ''}">
              <h3>${a.unlocked ? '✅' : '🔒'} ${a.title}</h3>
              <p class="muted">${a.description}</p>
              <p>${a.unlocked ? 'Desbloqueado' : 'Pendiente'}</p>
            </article>
          `).join('')}
        </div>
      `;
    }

    function cssSafe(text) {
      return text.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '').replace(/[^a-z0-9]+/g, '-');
    }

    function startMarathon() {
      const queue = getFilteredUniverseVideos();
      if (!queue.length) return;
      state.marathon.active = true;
      state.marathon.queue = queue;
      state.marathon.position = 0;
      state.selectedVideoId = queue[0].id;
      renderUniverseView();
      updateMarathonLabel();
    }

    function nextInMarathon() {
      if (!state.marathon.active) return;
      if (state.marathon.position >= state.marathon.queue.length - 1) {
        state.marathon.active = false;
        updateMarathonLabel('Maratón finalizado.');
        return;
      }
      state.marathon.position += 1;
      const current = state.marathon.queue[state.marathon.position];
      state.selectedVideoId = current.id;
      renderUniverseView();
      updateMarathonLabel();
    }

    function updateMarathonLabel(override) {
      const el = document.getElementById('marathonState');
      if (!el) return;
      if (override) {
        el.textContent = override;
        return;
      }
      if (state.marathon.active) {
        el.textContent = `Reproduciendo ${state.marathon.position + 1} de ${state.marathon.queue.length}`;
      } else {
        el.textContent = 'Modo Maratón desactivado';
      }
    }

    function attachPlayerEndedHandler() {
      const iframe = document.getElementById('videoPlayer');
      if (!iframe) return;
      const currentUrl = new URL(iframe.src);
      const videoId = currentUrl.pathname.split('/').pop();

      // Fallback simple: avanza cada 12s en modo maratón si no se puede captar evento "ended" del reproductor embebido.
      // Esto mantiene la reproducción encadenada sin interacción adicional tras activar maratón.
      clearTimeout(window.__marathonFallback);
      if (state.marathon.active && videoId) {
        window.__marathonFallback = setTimeout(nextInMarathon, 12000);
      }
    }

    function changeView(next) {
      state.view = next;
      viewMap.classList.toggle('active', next === 'map');
      viewUniverse.classList.toggle('active', next === 'universe');
      viewAchievements.classList.toggle('active', next === 'achievements');
      document.querySelectorAll('.sidebar-nav .sidebar-item').forEach(btn => btn.classList.remove('active'));
      if (next === 'achievements') {
        navAchievements.classList.add('active');
      } else {
        navUniverses.classList.add('active');
      }

      if (next === 'map') renderMapView();
      if (next === 'universe') renderUniverseView();
      if (next === 'achievements') renderAchievementsView();
    }

    toggleSidebar.onclick = () => {
      appLayout.classList.toggle('sidebar-collapsed');
      toggleSidebar.textContent = appLayout.classList.contains('sidebar-collapsed') ? '➡️ Expandir menú' : '↔️ Colapsar menú';
    };

    const upcomingNavs = ['navInicio', 'navIndice', 'navMaraton', 'navRarezas', 'navActores', 'navVersiones', 'navFavoritos', 'navBuscar', 'navStats', 'navConfig'];
    upcomingNavs.forEach(id => {
      const btn = document.getElementById(id);
      if (!btn) return;
      btn.onclick = () => {
        alert('Esta sección está preparada en el menú y la activaremos en la siguiente etapa.');
      };
    });

    navUniverses.onclick = () => changeView(state.universe ? 'universe' : 'map');
    navAchievements.onclick = () => changeView('achievements');

    localStorage.removeItem(UNIVERSES_STORAGE_KEY);
    state.universeNodes = [];
    changeView('map');
  </script>
</body>
</html>
